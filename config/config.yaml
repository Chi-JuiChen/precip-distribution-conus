# =============================================================================
# Precipitation Distribution Analysis - Configuration
# =============================================================================

# --- Time period ---
years:
  start: 2001
  end: 2020

# --- Analysis parameters ---
analysis:
  wet_threshold: 0.1        # mm/day — minimum to count as a wet day
  rolling_days: 7           # days for rolling average
  min_samples: 30           # minimum wet-day samples required to fit a distribution
  target_resolution: 0.25   # degrees (output grid spacing)

# --- CONUS domain ---
domain:
  lat_min: 24.0
  lat_max: 50.0
  lon_min: -125.0
  lon_max: -66.0

# --- Data paths (relative to project root) ---
paths:
  raw_cpc:       data/raw/cpc
  raw_imerg:     data/raw/imerg
  processed_cpc: data/processed/cpc
  processed_imerg: data/processed/imerg
  # Climate index files (ONI, RMM) — downloaded once, committed to git
  indices:       data/indices
  # Unconditional analysis outputs (all-years, no conditioning)
  output_stats:   output/unconditional/stats
  output_figures: output/unconditional/figures
  # Conditional analysis outputs (stratified by season / ENSO / MJO)
  conditional_stats:   output/conditional/stats
  conditional_figures: output/conditional/figures

# --- Conditional analysis parameters ---
# References:
#   ENSO — Johnson et al. (2014, Wea. Fcst.); NOAA CPC ONI definition
#   MJO  — Wheeler & Hendon (2004, MWR); Johnson et al. (2014)
conditional:
  enso_threshold: 0.5          # |Niño 3.4 3-month mean| >= threshold → El Niño / La Niña
  mjo_amp_threshold: 1.0       # RMM amplitude >= threshold → active MJO (unanimous in literature)
  mjo_n_phases: 8              # always use all 8 phases individually
  seasons: [DJF, MAM, JJA, SON]
  enso_phases: [el_nino, neutral, la_nina]

# --- ONI index download (Niño 3.4 monthly SST anomaly) ---
oni:
  # NOAA CPC SST index file — monthly, all Niño regions, free download
  url: "https://www.cpc.ncep.noaa.gov/data/indices/sstoi.indices"
  filename: "sstoi.indices"

# --- RMM index download (Wheeler & Hendon 2004 MJO index) ---
rmm:
  # Bureau of Meteorology (BoM), Australia — daily RMM1, RMM2, phase, amplitude
  url: "http://www.bom.gov.au/climate/mjo/graphics/rmm.74toRealtime.txt"
  filename: "rmm.74toRealtime.txt"
  missing_value: 999.0

# --- CPC download ---
cpc:
  # NOAA PSL HTTP server (no account needed)
  base_url: "https://downloads.psl.noaa.gov/Datasets/cpc_us_precip"
  rt_url:   "https://downloads.psl.noaa.gov/Datasets/cpc_us_precip/RT"
  # File naming: precip.V1.0.{YYYY}.nc  (both main and RT directories)
  filename_template: "precip.V1.0.{year}.nc"
  # Years 2007+ are in /RT/ subdirectory; ≤2006 are in the main directory
  rt_start_year: 2007
  variable: "precip"      # variable name inside NetCDF
  fill_value: -9.96921e+36

# --- IMERG v07 download ---
imerg:
  # NASA GES DISC (requires Earthdata account + ~/.netrc)
  base_url: "https://gpm1.gesdisc.eosdis.nasa.gov/data/GPM_L3/GPM_3IMERGHH.07"
  # Daily accumulated product
  daily_url: "https://gpm1.gesdisc.eosdis.nasa.gov/data/GPM_L3/GPM_3IMERGDF.07"
  variable: "precipitation"       # mm/hr in v07 daily product (× 24 → mm/day)
  # Regridding method for xesmf
  regrid_method: "conservative"

# --- Visualization ---
visualization:
  dpi: 150
  figsize: [14, 8]      # inches for single map
  figsize_panel: [18, 12]  # inches for 6-panel figure
  cmap_delta_aic: "RdBu_r"   # diverging: blue=lognorm better, red=gamma better
  cmap_ks: "YlOrRd"
  cmap_pval: "RdYlGn"
  cmap_best_fit: "bwr"
